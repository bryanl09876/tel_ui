<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 15px; margin: 0;
            background-color: var(--tg-theme-bg-color, #1c1c1d);
            color: var(--tg-theme-text-color, #ffffff);
        }
        .section { margin-top: 2px; border-bottom: 1px solid var(--tg-theme-hint-color, #3a3a3c); padding-bottom: 10px; margin-bottom: 15px; }
        .section h3 { margin: 0 0 10px 0; font-size: 16px; color: var(--tg-theme-button-color, #007aff); }
        .section_lb h3 { margin: 0 0 10px 0; font-size: 16px; color: #d11919; }
        .section_fwd h3 { margin: 0 0 10px 0; font-size: 16px; color: #33cc33; }
        .section_ovpn h3 { margin: 0 0 10px 0; font-size: 16px; color: orange; }
        .form-group { margin-bottom: 10px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: var(--tg-theme-hint-color, #98989e); }
        input, select {
            width: 100%; padding: 10px; box-sizing: border-box; font-size: 14px;
            border: 1px solid var(--tg-theme-hint-color, #3a3a3c); border-radius: 8px;
            background-color: var(--tg-theme-secondary-bg-color, #2c2c2e);
            color: var(--tg-theme-text-color, #ffffff);
        }
        .btn {
            width: 100%; padding: 14px; margin-bottom: 10px; border: none; border-radius: 50px;
            font-size: 16px; font-weight: bold; cursor: pointer; display: block;
        }
        .btn-gh { background-color: blue; color: white; }
        .btn-lb { background-color: red; color: white; }
        .btn-fwd { background-color: green; color: white; }
        .btn-ovpn { background-color: orange; color: white; }
        .btn-back { background-color: transparent; color: var(--tg-theme-text-color); border: 1px solid var(--tg-theme-hint-color); }
        /* Utility classes for hiding elements */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="main_menu">
        <h2 style="text-align: center; margin-bottom: 20px;">Select Deployment Type</h2>
        <button class="btn btn-gh" onclick="showForm('gh')">🚀 Configure GH Setup</button>
        <button class="btn btn-lb" onclick="showForm('lb')">🛡️ Configure LB Relay</button>
        <button class="btn btn-fwd" onclick="showForm('fwd')">⏩ Configure FWD Relay</button>
        <button class="btn btn-ovpn" onclick="showForm('ovpn')">🔑 Not working yet Build OpenVPN </button>
    </div>

    <div id="form_container" class="hidden">
        
        <button class="btn btn-back" onclick="goBack()">⬅️ Back to Menu</button>

        <div id="infrastructure_section" class="section">
            <h3>🌍 Infrastructure Setup 🌍</h3>
            <div class="form-group">
                <label>Vultr Region</label>
                <select id="region_ID">
                    <option value="9">Singapore (sgp) - 9</option>
                    <option value="12">Frankfurt (fra) - 12</option>
                    <option value="15">London (lhr) - 15</option>
                    <option value="17">Amsterdam (ams) - 17</option>
                    <option value="18">Warsaw (waw) - 18</option>
                    <option value="19">Stockholm (sto) - 19</option>
                    <option value="21">Mexico City (mex) - 21</option>
                    <option value="22">Atlanta (atl) - 22</option>
                    <option value="24">New Jersey (ewr) - 24</option>
                    <option value="27">Miami (mia) - 27</option>
                    <option value="28">Chicago (ord) - 28</option>
                    <option value="30">Silicon Valley (sjc) - 30</option>
                </select>
            </div>
            <div class="form-group"><label>Node A Hostname</label><input type="text" id="vps_hostname_A" placeholder="e.g., alpha"></div>
            <div class="form-group"><label>Node B Hostname</label><input type="text" id="vps_hostname_B" placeholder="e.g., bravo"></div>
        </div>

        <div id="tunnel_section" class="section">
            <h3>🚇 Tunnel Configuration 🚇</h3>
            <div class="form-group">
                <label>Tunnel Type</label>
                <select id="tun_type">
                    <option value="gre">GRE</option>
                    <option value="vxlan">VXLAN</option>
                </select>
            </div>
            <div class="form-group"><label>VXLAN ID (Dont remove 5000 unless !=5000)</label><input type="text" id="vxlan_id" value="5000"></div>
            <div class="form-group"><label>Tunnel Public Dest IP</label><input type="text" id="tun_pub_dest_ip" placeholder="1.2.3.4"></div>
            <div class="form-group"><label>Tunnel Interface IP</label><input type="text" id="tun_interface_ip" placeholder="10.58.x.x/30"></div>
            <div class="form-group"><label>Tunnel Next Hop IP</label><input type="text" id="tun_nexthop_ip" placeholder="10.58.x.x"></div>
            <div class="form-group"><label>Tunnel Routed Subnet</label><input type="text" id="tun_routed_subnet" placeholder="10.60.x.x/28"></div>
        </div>

        <div id="dnat_section" class="section_lb hidden">
            <h3>🛡️ DNAT Settings 🛡️</h3>
            <div class="form-group"><label>OpenVPN Dest IP (1194)</label><input type="text" id="dest_ip_ovpn" placeholder="IP Address"></div>
            <div class="form-group"><label>IPsec Dest IP (500/4500)</label><input type="text" id="dest_ipsec" placeholder="IP Address"></div>
        </div>

        <div id="fwd_section" class="section_fwd hidden">
            <h3>⏩ Port Forwarding  ⏩</h3>
            <div class="form-group"><label>Forwarding Port ex. 1194</label><input type="text" id="forwarding_port" placeholder="Port Number"></div>
            <div class="form-group"><label>Final Destination IP</label><input type="text" id="dest_ip" placeholder="Destination IP"></div>
        </div>
        
        <div id="ovpn_section" class="section_ovpn hidden">
            <h3> 🔑 OpenVPN 🔑 </h3>
            <div class="form-group"><label>OpenVPN Listening Port ex. 1194</label>
            <input type="text" id="sPort" placeholder="Port Number" value="1194">
            </div>
            <div class="form-group">
                <label>VPN Protocol</label>
                <select id="tcp_udp">
                    <option value="udp">udp</option>
                    <option value="tcp">tcp</option>
                </select>
            </div>
        </div>
        
        <button id="btn_submit_gh" class="btn btn-gh hidden" onclick="submitForm('deploy_gh')">🚀 Deploy GH Setup</button>
        <button id="btn_submit_lb" class="btn btn-lb hidden" onclick="submitForm('deploy_lb')">🛡️ Deploy LB Relay</button>
        <button id="btn_submit_fwd" class="btn btn-fwd hidden" onclick="submitForm('deploy_fwd')">⏩ Deploy FWD Relay</button>
        <button id="btn_submit_ovpn" class="btn btn-ovpn hidden" onclick="submitForm('deploy_ovpn')"> 🔑 Not working yet Build OpenVPN </button>
    </div>

    <script>
        Telegram.WebApp.ready();
        // SECURITY LOCK: Prevent opening in a normal browser
        if (Telegram.WebApp.platform === "") {
            // If they aren't in Telegram, delete the whole app from the screen!
            document.body.innerHTML = "<h2 style='text-align:center; margin-top:50px; color:#d11919;'>⛔ Access Denied.</h2>";
            throw new Error("Because");
        }
        Telegram.WebApp.expand(); 

        function showForm(type) {
            document.getElementById('main_menu').classList.add('hidden');
            document.getElementById('form_container').classList.remove('hidden');

            // 1. Reset everything to hidden
            document.getElementById('dnat_section').classList.add('hidden');
            document.getElementById('fwd_section').classList.add('hidden');
            document.getElementById('ovpn_section').classList.add('hidden');
            // Reset ALL buttons to hidden
            document.getElementById('btn_submit_gh').classList.add('hidden');
            document.getElementById('btn_submit_lb').classList.add('hidden');
            document.getElementById('btn_submit_fwd').classList.add('hidden');
            document.getElementById('btn_submit_ovpn').classList.add('hidden');
            
            // 2. Assume infrastructure/tunnel are visible by default
            document.getElementById('infrastructure_section').classList.remove('hidden');
            document.getElementById('tunnel_section').classList.remove('hidden');

            // 3. Turn on exactly what we need
            if (type === 'gh') {
                document.getElementById('dnat_section').classList.remove('hidden');
                document.getElementById('btn_submit_gh').classList.remove('hidden');
                document.getElementById('ovpn_section').classList.add('hidden');
                
            } else if (type === 'lb') {
            	document.getElementById('ovpn_section').classList.add('hidden');
                document.getElementById('btn_submit_lb').classList.remove('hidden');
                
            } else if (type === 'fwd') {
                // Keep the Infrastructure section VISIBLE
                // hide  tunnel and ovpn section!
                document.getElementById('tunnel_section').classList.add('hidden');
                document.getElementById('ovpn_section').classList.add('hidden');
                
                // Show FWD settings and button
                document.getElementById('fwd_section').classList.remove('hidden');
                document.getElementById('btn_submit_fwd').classList.remove('hidden');
                
            } else if (type === 'ovpn') {
                // Keep the Infrastructure section VISIBLE (Vultr needs Region/Names)
                // Only hide the Tunnel section!
                document.getElementById('tunnel_section').classList.add('hidden');
                
                // Show FWD settings and button
                document.getElementById('ovpn_section').classList.remove('hidden');
                document.getElementById('btn_submit_ovpn').classList.remove('hidden');
            }
        }

        function goBack() {
            document.getElementById('form_container').classList.add('hidden');
            document.getElementById('main_menu').classList.remove('hidden');
        }

        function submitForm(actionType) {
            const data = {
                action: actionType,
                region_ID: document.getElementById('region_ID').value,
                vps_hostname_A: document.getElementById('vps_hostname_A').value,
                vps_hostname_B: document.getElementById('vps_hostname_B').value,
                tun_type: document.getElementById('tun_type').value,
                vxlan_id: document.getElementById('vxlan_id').value,
                tun_pub_dest_ip: document.getElementById('tun_pub_dest_ip').value,
                tun_interface_ip: document.getElementById('tun_interface_ip').value,
                tun_nexthop_ip: document.getElementById('tun_nexthop_ip').value,
                tun_routed_subnet: document.getElementById('tun_routed_subnet').value,
                dest_ip_ovpn: document.getElementById('dest_ip_ovpn').value,
                dest_ipsec: document.getElementById('dest_ipsec').value,
                forwarding_port: document.getElementById('forwarding_port').value,
                dest_ip: document.getElementById('dest_ip').value,
                tcp_udp: document.getElementById('tcp_udp').value,
                OpenVPN_Port: document.getElementById('sPort').value
            };
            
            Telegram.WebApp.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
