<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Automatically adapts to Telegram's Dark or Light mode! */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 15px; margin: 0;
            background-color: var(--tg-theme-bg-color, #1c1c1d);
            color: var(--tg-theme-text-color, #ffffff);
        }
        .section { margin-top: 2px; border-bottom: 1px solid var(--tg-theme-hint-color, #3a3a3c); padding-bottom: 10px; margin-bottom: 15px; }
        .section h3 { margin: 0 0 10px 0; font-size: 16px; color: var(--tg-theme-button-color, #007aff); }
        .section_lb h3 { margin: 0 0 10px 0; font-size: 16px; color: var(--tg-theme-button-color, #d11919); }
        .form-group { margin-bottom: 10px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: var(--tg-theme-hint-color, #98989e); }
        input, select {
            width: 100%; padding: 10px; box-sizing: border-box; font-size: 14px;
            border: 1px solid var(--tg-theme-hint-color, #3a3a3c); border-radius: 8px;
            background-color: var(--tg-theme-secondary-bg-color, #2c2c2e);
            color: var(--tg-theme-text-color, #ffffff);
        }
        .btn {
            width: 100%; padding: 14px; margin-top: 10px; border: none; border-radius: 50px;
            font-size: 16px; font-weight: bold; cursor: pointer;
        }
        .btn-gh { background-color: var(--tg-theme-button-color, #007aff); color: var(--tg-theme-button-text-color, #fff); }
        .btn-lb { background-color: #d11919; color: #fff; }
    </style>
</head>
<body>

    <div class="section">
        <h3>🌍 Infrastructure Setup</h3>
        <div class="form-group">
            <label>Vultr Region</label>
            <select id="region_ID">
                <option value="9">Singapore (ggp) - 9</option>
                <option value="12">Frankfurt (fra) - 12</option>
                <option value="15">London (lhr) - 15</option>
                <option value="17">Amsterdam (ams) - 17</option>
                <option value="18">Warsaw (waw) - 18</option>
                <option value="19">Stockholm (sto) - 19</option>
                <option value="21">Mexico City (med) - 21</option>
                <option value="22">Atlanta (atl) - 22</option>
                <option value="24">New Jersey (ewr) - 24</option>
                <option value="27">Miami (mia) - 27</option>
                <option value="28">Chicago (ord) - 28</option>
                <option value="30">Silicon Valley (sjc) 30</option>
                
            </select>
        </div>
        <div class="form-group">
            <label>Node A Hostname</label>
            <input type="text" id="vps_hostname_A" placeholder="e.g., alpha">
        </div>
        <div class="form-group">
            <label>Node B Hostname</label>
            <input type="text" id="vps_hostname_B" placeholder="e.g., bravo">
        </div>
    </div>

    <div class="section">
        <h3>🚇 Tunnel Configuration</h3>
        <div class="form-group">
            <label>Tunnel Type</label>
            <select id="tun_type">
                <option value="gre">GRE</option>
                <option value="vxlan">VXLAN</option>
            </select>
        </div>
        <div class="form-group"><label>VXLAN ID (Dont remove 5000 unless !=5000)</label><input type="text" id="vxlan_id" value="5000"></div>
        <div class="form-group"><label>Tunnel Public Dest IP</label><input type="text" id="tun_pub_dest_ip" placeholder="1.2.3.4"></div>
        <div class="form-group"><label>Tunnel Interface IP</label><input type="text" id="tun_interface_ip" placeholder="10.58.x.x/30"></div>
        <div class="form-group"><label>Tunnel Next Hop IP</label><input type="text" id="tun_nexthop_ip" placeholder="10.58.x.x"></div>
        <div class="form-group"><label>Tunnel Routed Subnet</label><input type="text" id="tun_routed_subnet" placeholder="10.60.x.x/28"></div>
    </div>

    <div class="section_lb">
        <h3>🛡️ DNAT Settings (Ignored for LB)</h3>
        <div class="form-group"><label>OpenVPN Dest IP (1194)</label><input type="text" id="dest_ip_ovpn" placeholder="IP Address"></div>
        <div class="form-group"><label>IPsec Dest IP (500/4500)</label><input type="text" id="dest_ipsec" placeholder="IP Address"></div>
    </div>

    <button class="btn btn-gh" onclick="submitForm('deploy_gh')">🚀 Deploy GH Setup</button>
    <button class="btn btn-lb" onclick="submitForm('deploy_lb')">🛡️ Deploy LB Relay</button>

    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand(); // Opens the app in full-screen mode

        function submitForm(actionType) {
            // Gather all inputs into a neat JSON dictionary
            const data = {
                action: actionType,
                region_ID: document.getElementById('region_ID').value,
                vps_hostname_A: document.getElementById('vps_hostname_A').value,
                vps_hostname_B: document.getElementById('vps_hostname_B').value,
                tun_type: document.getElementById('tun_type').value,
                vxlan_id: document.getElementById('vxlan_id').value,
                tun_pub_dest_ip: document.getElementById('tun_pub_dest_ip').value,
                tun_interface_ip: document.getElementById('tun_interface_ip').value,
                tun_nexthop_ip: document.getElementById('tun_nexthop_ip').value,
                tun_routed_subnet: document.getElementById('tun_routed_subnet').value,
                dest_ip_ovpn: document.getElementById('dest_ip_ovpn').value,
                dest_ipsec: document.getElementById('dest_ipsec').value
            };
            
            // Beam it back to Python!
            Telegram.WebApp.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
